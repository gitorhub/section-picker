<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<title>Section HTML-CSS Picker</title>
<style>
  :root{
    --bg-color:#272822;
    --bg-muted:#2d2a2e;
    --bg-alt:#3e3d32;
    --text-color:#f8f8f2;
    --text-muted:#a59f85;
    --border-color:#3e3d32;
    --primary-color:#ff5c00;
    --primary-color-light:#3d1a00;
    --surface-0:#1e1e1e;
    --surface-1:#252526;
    --surface-2:#2d2d30;
    --accent-color:var(--primary-color);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:440px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg-color);color:var(--text-color)}

  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-color);background:var(--surface-0)}
  .logo{font-weight:700;font-size:13px;color:var(--accent-color);display:flex;align-items:center;gap:7px}
  .logo svg{width:17px;height:17px}

  #pickBtn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;border:1px solid var(--bg-alt);cursor:pointer;font-size:11px;font-weight:700;background:var(--primary-color-light);color:var(--accent-color);transition:all .15s}
  #pickBtn:hover{background:var(--bg-alt);color:var(--text-color)}
  #pickBtn svg{width:12px;height:12px}

  #status{font-size:11.5px;color:var(--text-muted);padding:8px 16px;min-height:30px;display:flex;align-items:center;border-bottom:1px solid var(--border-color)}
  #status.success{color:#a6e22e}

  .tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border-color)}
  .tab{padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .tab.active{color:var(--accent-color);border-bottom-color:var(--accent-color)}

  .panel{display:none}.panel.active{display:block}

  pre{padding:12px 16px;font-size:10.5px;line-height:1.7;font-family:"Fira Code","Cascadia Code",Consolas,monospace;color:var(--text-color);background:var(--surface-0);max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;user-select:text;-webkit-user-select:text;cursor:text;outline:none}
  pre:focus{box-shadow:inset 0 0 0 1px var(--bg-alt)}
  pre::-webkit-scrollbar{width:4px}
  pre::-webkit-scrollbar-track{background:var(--surface-0)}
  pre::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:2px}

  .actions{padding:12px 16px}
  .btn{width:100%;padding:9px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s}
  .btn.primary{background:var(--primary-color-light);color:var(--accent-color);border:1px solid var(--bg-alt);letter-spacing:.01em}
  .btn.primary:hover{background:var(--bg-alt);color:var(--text-color);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,92,0,.2)}
  .btn.primary:active{transform:translateY(0)}

  .empty{text-align:center;padding:36px 20px 32px;color:var(--text-muted);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.5}
  .empty svg{width:32px;height:32px;opacity:.4}
  .kbd{display:inline-block;background:var(--surface-2);border:1px solid var(--bg-alt);border-radius:4px;padding:1px 6px;font-size:10px;font-family:monospace;color:var(--accent-color);margin:0 1px}

  #toast{position:fixed;bottom:10px;left:50%;transform:translateX(-50%) translateY(12px);background:#a6e22e;color:#1a1a0e;font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:99}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    Section HTML-CSS Picker
  </div>
  <button id="pickBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
    Yeni Seçim
  </button>
</div>

<div id="status"></div>

<div id="content">
  <div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    <div>İkona tıkla, sayfada element seç</div>
    <div style="font-size:10.5px;color:var(--text-muted);line-height:1.8">
      <span class="kbd">↑↓</span> parent/child &nbsp;
      <span class="kbd">←→</span> sibling &nbsp;
      <span class="kbd">Enter</span> seç &nbsp;
      <span class="kbd">ESC</span> çık
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
